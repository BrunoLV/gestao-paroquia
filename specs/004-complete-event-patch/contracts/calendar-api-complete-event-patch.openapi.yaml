openapi: 3.0.3
info:
  title: Calendario API - Complete Event Patch Delta
  version: 0.1.0
  description: >-
    Delta de contrato para atualizacao parcial completa de evento com persistencia
    real, autorizacao por escopo/papel e aprovacao obrigatoria para alteracoes
    sensiveis de data e cancelamento.
servers:
  - url: /api/v1
paths:
  /eventos/{eventoId}:
    patch:
      summary: Atualizar parcialmente evento com regras completas de dominio
      operationId: patchEventoCompleto
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: eventoId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventoCompletoRequest'
            examples:
              patchDescricao:
                summary: Atualizacao parcial simples
                value:
                  descricao: Ajuste de descricao para comunicacao paroquial.
              patchParticipantes:
                summary: Adicao de participantes por coordenador/vice da org responsavel
                value:
                  participantes:
                    - 00000000-0000-0000-0000-0000000000b1
                    - 00000000-0000-0000-0000-0000000000b2
              patchMudancaSensivel:
                summary: Alteracao de horario com aprovacao associada
                value:
                  inicio: '2026-04-21T18:00:00Z'
                  fim: '2026-04-21T20:00:00Z'
                  aprovacaoId: 00000000-0000-0000-0000-0000000000c1
      responses:
        '200':
          description: Evento atualizado e persistido com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventoPatchResponse'
        '400':
          description: Requisicao invalida ou violacao de regra de dominio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                validationError:
                  summary: Payload invalido
                  value:
                    errorCode: VALIDATION_ERROR
                    message: Validation failed
                    correlationId: 4d490931-0573-43a9-a9f5-5d370b9dca4a
                    errors:
                      - field: body
                        code: VALIDATION_ERROR
                        message: PATCH payload must not be empty
                        rejectedValue: null
                businessRule:
                  summary: Regra de dominio violada
                  value:
                    errorCode: DOMAIN_RULE_VIOLATION
                    message: fim deve ser maior que inicio
                    correlationId: 2e5ed6e5-f987-4c78-bd4b-4ff06ec87c09
                    errors:
                      - field: fim
                        code: DOMAIN_RULE_VIOLATION
                        message: fim deve ser maior que inicio
                        rejectedValue: '2026-04-21T17:00:00Z'
        '403':
          description: Usuario sem permissao para o tipo de alteracao solicitada ou aprovacao obrigatoria ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                forbidden:
                  summary: Tentativa de troca de organizacao responsavel sem perfil permitido
                  value:
                    errorCode: FORBIDDEN
                    message: User does not have permission for this patch operation
                    correlationId: 653c5f7f-102b-47bc-bd52-b5ed1f6f7da1
                    errors:
                      - field: organizacaoResponsavelId
                        code: FORBIDDEN
                        message: Only conselho coordinator or parroco can change responsible organization
                        rejectedValue: 00000000-0000-0000-0000-0000000000d1
                approvalRequired:
                  summary: Alteracao sensivel sem aprovacao valida
                  value:
                    errorCode: APPROVAL_REQUIRED
                    message: Approval is required for date change or cancellation
                    correlationId: 29a7d27f-0be8-4b73-b998-a7f98210f6ff
                    errors:
                      - field: aprovacaoId
                        code: APPROVAL_REQUIRED
                        message: Conselho coordinator, conselho vice-coordinator, or parroco approval is required
                        rejectedValue: null
        '404':
          description: Evento nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                notFound:
                  value:
                    errorCode: EVENT_NOT_FOUND
                    message: Evento not found
                    correlationId: c88c5b66-ac9d-46fe-9ffa-71a4e90de5cb
                    errors:
                      - field: eventoId
                        code: EVENT_NOT_FOUND
                        message: Event does not exist
                        rejectedValue: 00000000-0000-0000-0000-000000000099
        '409':
          description: Conflito de concorrencia na atualizacao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                conflict:
                  value:
                    errorCode: CONFLICT
                    message: Concurrent update conflict
                    correlationId: a60ed267-4bbd-4ae4-b228-53b66201bb35
                    errors:
                      - field: version
                        code: CONFLICT
                        message: Event was updated by another transaction
                        rejectedValue: null
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UpdateEventoCompletoRequest:
      type: object
      additionalProperties: false
      properties:
        titulo:
          type: string
          minLength: 1
          maxLength: 160
        descricao:
          type: string
          maxLength: 4000
        inicio:
          type: string
          format: date-time
        fim:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/EventoStatusInput'
        adicionadoExtraJustificativa:
          type: string
          maxLength: 4000
        canceladoMotivo:
          type: string
          maxLength: 2000
        organizacaoResponsavelId:
          type: string
          format: uuid
        participantes:
          type: array
          items:
            type: string
            format: uuid
        aprovacaoId:
          type: string
          format: uuid
          description: >-
            Identificador de aprovacao exigido para alteracoes de data/horario
            e cancelamento.
    EventoPatchResponse:
      type: object
      required:
        - id
        - titulo
        - inicio
        - fim
        - status
      properties:
        id:
          type: string
          format: uuid
        titulo:
          type: string
        descricao:
          type: string
          nullable: true
        organizacaoResponsavelId:
          type: string
          format: uuid
        participantes:
          type: array
          items:
            type: string
            format: uuid
        inicio:
          type: string
          format: date-time
        fim:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/EventoStatusResponse'
        canceladoMotivo:
          type: string
          nullable: true
        adicionadoExtraJustificativa:
          type: string
          nullable: true
    EventoStatusInput:
      type: string
      enum: [RASCUNHO, CONFIRMADO, CANCELADO, ADICIONADO_EXTRA]
    EventoStatusResponse:
      type: string
      enum: [RASCUNHO, CONFIRMADO, CANCELADO, ADICIONADO_EXTRA]
    ValidationErrorResponse:
      type: object
      required:
        - errorCode
        - message
      properties:
        errorCode:
          type: string
          enum:
            - EVENT_NOT_FOUND
            - VALIDATION_ERROR
            - DOMAIN_RULE_VIOLATION
            - FORBIDDEN
            - APPROVAL_REQUIRED
            - CONFLICT
        message:
          type: string
        correlationId:
          type: string
        errors:
          type: array
          items:
            type: object
            required: [field, code, message]
            properties:
              field:
                type: string
              code:
                type: string
              message:
                type: string
              rejectedValue:
                type: string
                nullable: true
