openapi: 3.0.3
info:
  title: Calendario API - Event Cancellation Delta
  version: 0.1.0
  description: >-
    Delta de contrato para cancelamento de eventos confirmados com soft delete,
    motivo obrigatório, RBAC por escopo organizacional e fluxo de aprovação com
    efetivação automática.
servers:
  - url: /api/v1
paths:
  /eventos/{eventoId}:
    delete:
      summary: Cancelar evento confirmado ou criar solicitação pendente de cancelamento
      operationId: cancelEvento
      security:
        - sessionAuth: []
      parameters:
        - in: path
          name: eventoId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelamentoEventoRequest'
            examples:
              cancelamentoDireto:
                summary: Cancelamento imediato por pároco ou liderança do conselho
                value:
                  motivo: Mudança administrativa no calendário anual.
              cancelamentoPendente:
                summary: Solicitação pendente de cancelamento por coordenador de pastoral
                value:
                  motivo: Evento precisará ser suprimido por indisponibilidade da equipe.
      responses:
        '200':
          description: Cancelamento efetivado imediatamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventoCanceladoResponse'
              examples:
                cancelamentoEfetivado:
                  summary: Cancelamento imediato finalizado
                  value:
                    id: 9e06d22a-7d53-4f68-bb72-5fd7569ba8bb
                    status: CANCELADO
                    canceladoMotivo: Evento suprimido pelo conselho paroquial.
                    titulo: Celebração Festiva
                    inicio: 2026-10-01T10:00:00Z
                    fim: 2026-10-01T11:00:00Z
                    organizacaoResponsavelId: 00000000-0000-0000-0000-0000000000aa
        '202':
          description: Solicitação de cancelamento criada e aguardando aprovação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelamentoPendenteResponse'
              examples:
                solicitacaoPendenteCriada:
                  summary: Fluxo pendente criado para decisão posterior
                  value:
                    solicitacaoAprovacaoId: d1d3fef0-4586-49ab-b548-59e63080b6f7
                    status: PENDENTE
                    eventoId: 9e06d22a-7d53-4f68-bb72-5fd7569ba8bb
                    mensagem: Solicitação criada e aguardando decisão de aprovador autorizado.
        '400':
          description: Requisição inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                motivoAusente:
                  value:
                    errorCode: VALIDATION_ERROR
                    message: Motivo de cancelamento é obrigatório
                    correlationId: 7bf7f6a8-a452-4f1f-a5e7-7b5460ae9c8f
                    errors:
                      - field: motivo
                        code: VALIDATION_ERROR
                        message: motivo must not be blank
                        rejectedValue: null
        '403':
          description: Papel sem permissão para solicitar cancelamento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden:
                  value:
                    errorCode: FORBIDDEN
                    message: User does not have permission to cancel this event
                    correlationId: b7e1c2ab-a746-4f2e-8f2c-cceecb2f2429
                    errors:
                      - field: actor
                        code: FORBIDDEN
                        message: Role is not authorized for event cancellation
                        rejectedValue: membro
        '404':
          description: Evento não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    errorCode: EVENT_NOT_FOUND
                    message: Evento not found
                    correlationId: 4f11fe03-e426-4574-b8f5-a388b41637b2
                    errors:
                      - field: eventoId
                        code: EVENT_NOT_FOUND
                        message: Event does not exist
                        rejectedValue: 00000000-0000-0000-0000-000000000099
        '409':
          description: Estado do evento não permite cancelamento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidTransition:
                  value:
                    errorCode: INVALID_STATUS_TRANSITION
                    message: Only CONFIRMADO events can be cancelled
                    correlationId: 90ea4c06-36db-48df-8472-321d56c2d221
                    errors:
                      - field: status
                        code: INVALID_STATUS_TRANSITION
                        message: Event is not in CONFIRMADO state
                        rejectedValue: RASCUNHO

  /aprovacoes/{id}:
    patch:
      summary: Decidir solicitação pendente e executar automaticamente a ação aprovada
      operationId: decideAprovacaoComExecucao
      security:
        - sessionAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalDecisionRequest'
            examples:
              aprovar:
                value:
                  status: APROVADA
                  observacao: Aprovado conforme deliberação do conselho.
              reprovar:
                value:
                  status: REPROVADA
                  observacao: Cancelamento não autorizado para este período.
      responses:
        '200':
          description: Decisão registrada; em caso de aprovação, a ação pendente foi processada automaticamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalDecisionResponse'
        '400':
          description: Payload inválido ou ação pendente incompatível
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário sem autoridade para decidir a solicitação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Solicitação de aprovação não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Solicitação já decidida ou falha na efetivação automática
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                executionFailed:
                  value:
                    errorCode: APPROVAL_EXECUTION_FAILED
                    message: Approved request could not be executed automatically
                    correlationId: 6e593810-a559-4a1b-aedf-a2724be6ce14
                    errors:
                      - field: evento.status
                        code: APPROVAL_EXECUTION_FAILED
                        message: Event is no longer in CONFIRMADO state
                        rejectedValue: CANCELADO

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: JSESSIONID
  schemas:
    CancelamentoEventoRequest:
      type: object
      additionalProperties: false
      required:
        - motivo
      properties:
        motivo:
          type: string
          minLength: 1
          maxLength: 2000
    EventoCanceladoResponse:
      type: object
      required:
        - id
        - status
        - canceladoMotivo
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [CANCELADO]
        canceladoMotivo:
          type: string
        titulo:
          type: string
        inicio:
          type: string
          format: date-time
        fim:
          type: string
          format: date-time
        organizacaoResponsavelId:
          type: string
          format: uuid
    CancelamentoPendenteResponse:
      type: object
      required:
        - solicitacaoAprovacaoId
        - status
        - eventoId
      properties:
        solicitacaoAprovacaoId:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDENTE]
        eventoId:
          type: string
          format: uuid
        mensagem:
          type: string
    ApprovalDecisionRequest:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          enum: [APROVADA, REPROVADA]
        observacao:
          type: string
          maxLength: 2000
    ApprovalDecisionResponse:
      type: object
      required:
        - id
        - status
        - actionExecution
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [APROVADA, REPROVADA]
        actionExecution:
          type: object
          required:
            - outcome
          properties:
            outcome:
              type: string
              enum: [EXECUTED, REJECTED, FAILED]
            eventoId:
              type: string
              format: uuid
            eventStatus:
              type: string
              enum: [CONFIRMADO, CANCELADO]
            errorCode:
              type: string
              nullable: true
    ErrorResponse:
      type: object
      required:
        - errorCode
        - message
      properties:
        errorCode:
          type: string
          enum:
            - VALIDATION_ERROR
            - EVENT_NOT_FOUND
            - APPROVAL_NOT_FOUND
            - FORBIDDEN
            - INVALID_STATUS_TRANSITION
            - APPROVAL_EXECUTION_FAILED
            - APPROVAL_ALREADY_DECIDED
        message:
          type: string
        correlationId:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              code:
                type: string
              message:
                type: string
              rejectedValue:
                nullable: true
