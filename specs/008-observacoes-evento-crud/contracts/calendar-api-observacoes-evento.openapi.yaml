openapi: 3.0.3
info:
  title: Calendario API - Event Observations Delta
  version: 0.1.0
  description: >-
    Delta de contrato para observacoes de evento com criacao manual restrita a
    `NOTA`, listagem em dois modos, edicao com historico de revisoes e exclusao
    logica com ocultacao funcional.
servers:
  - url: /api/v1
paths:
  /eventos/{eventoId}/observacoes:
    post:
      summary: Criar nota manual para um evento
      operationId: createEventoNota
      security:
        - sessionAuth: []
      parameters:
        - in: path
          name: eventoId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObservacaoNotaCreateRequest'
            examples:
              notaValida:
                value:
                  tipo: NOTA
                  conteudo: Registrar alinhamento pastoral para a procissao.
      responses:
        '201':
          description: Nota criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObservacaoResponse'
        '400':
          description: Payload invalido ou tipo manual nao permitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                tipoInvalido:
                  value:
                    errorCode: OBSERVACAO_TIPO_MANUAL_INVALIDO
                    message: Only NOTA is accepted on the manual observation endpoint
                    correlationId: 294500b1-1a17-4e83-8630-f6f74d033a02
                    errors:
                      - field: tipo
                        code: OBSERVACAO_TIPO_MANUAL_INVALIDO
                        message: tipo must be NOTA
                        rejectedValue: CANCELAMENTO
        '403':
          description: Usuario sem permissao de colaboracao no evento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Evento nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Listar todas as observacoes funcionais do evento
      operationId: listEventoObservacoes
      security:
        - sessionAuth: []
      parameters:
        - in: path
          name: eventoId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Historico funcional do evento
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ObservacaoResponse'
              examples:
                listaEvento:
                  value:
                    - id: 8d0f6cb6-3f98-4d96-9ea2-20f8d4e705d1
                      eventoId: 00000000-0000-0000-0000-000000000010
                      usuarioId: 00000000-0000-0000-0000-000000000001
                      tipo: NOTA
                      conteudo: Contexto operacional
                      criadoEmUtc: 2026-04-13T12:00:00Z
        '403':
          description: Usuario sem permissao para leitura ampla das observacoes do evento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Evento nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /eventos/{eventoId}/observacoes/minhas:
    get:
      summary: Listar apenas minhas observacoes do evento
      operationId: listMinhasObservacoesEvento
      security:
        - sessionAuth: []
      parameters:
        - in: path
          name: eventoId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Historico funcional filtrado para o usuario autenticado
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ObservacaoResponse'
              examples:
                minhasObservacoes:
                  value:
                    - id: 26af21df-2a68-4b92-875f-4174ef5cdfe0
                      eventoId: 00000000-0000-0000-0000-000000000020
                      usuarioId: 00000000-0000-0000-0000-000000000001
                      tipo: NOTA
                      conteudo: Nota do usuario padrao
                      criadoEmUtc: 2026-04-13T12:05:00Z
        '401':
          description: Identidade do usuario nao resolvida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Evento nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /eventos/{eventoId}/observacoes/{observacaoId}:
    patch:
      summary: Editar nota propria preservando historico de revisoes
      operationId: patchEventoNota
      security:
        - sessionAuth: []
      parameters:
        - in: path
          name: eventoId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: observacaoId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObservacaoNotaUpdateRequest'
            examples:
              atualizarNota:
                value:
                  conteudo: Conteudo atualizado da nota
      responses:
        '200':
          description: Nota atualizada com historico de revisao preservado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObservacaoResponse'
              examples:
                notaAtualizada:
                  value:
                    id: 26af21df-2a68-4b92-875f-4174ef5cdfe0
                    eventoId: 00000000-0000-0000-0000-000000000020
                    usuarioId: 00000000-0000-0000-0000-000000000001
                    tipo: NOTA
                    conteudo: Conteudo atualizado da nota
                    criadoEmUtc: 2026-04-13T12:05:00Z
        '400':
          description: Payload invalido ou observacao de tipo imutavel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuario nao e autor da nota ou nao tem permissao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Observacao nao encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflito de concorrencia na revisao da nota
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Remover logicamente nota propria
      operationId: deleteEventoNota
      security:
        - sessionAuth: []
      parameters:
        - in: path
          name: eventoId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: observacaoId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Nota removida logicamente com sucesso
        '403':
          description: Usuario nao e autor da nota ou o tipo e imutavel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                autorInvalido:
                  value:
                    errorCode: OBSERVACAO_AUTOR_INVALIDO
                    message: User is not the observation author
        '404':
          description: Observacao nao encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Nota ja removida logicamente ou conflito de versao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: JSESSIONID
  schemas:
    ObservacaoNotaCreateRequest:
      type: object
      additionalProperties: false
      required:
        - tipo
        - conteudo
      properties:
        tipo:
          type: string
          enum: [NOTA]
        conteudo:
          type: string
          minLength: 1
          maxLength: 4000
    ObservacaoNotaUpdateRequest:
      type: object
      additionalProperties: false
      required:
        - conteudo
      properties:
        conteudo:
          type: string
          minLength: 1
          maxLength: 4000
    ObservacaoResponse:
      type: object
      required:
        - id
        - eventoId
        - usuarioId
        - tipo
        - conteudo
        - criadoEmUtc
      properties:
        id:
          type: string
          format: uuid
        eventoId:
          type: string
          format: uuid
        usuarioId:
          type: string
          format: uuid
        tipo:
          type: string
          enum: [NOTA, JUSTIFICATIVA, APROVACAO, REPROVACAO, CANCELAMENTO, AJUSTE_HORARIO, UNKNOWN_LEGACY]
        conteudo:
          type: string
        criadoEmUtc:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required:
        - errorCode
        - message
      properties:
        errorCode:
          type: string
          enum:
            - OBSERVACAO_TIPO_MANUAL_INVALIDO
            - OBSERVACAO_NAO_ENCONTRADA
            - OBSERVACAO_AUTOR_INVALIDO
            - OBSERVACAO_TIPO_IMUTAVEL
            - VALIDATION_REQUIRED_FIELD
            - ACCESS_DENIED
            - CONFLICT
        message:
          type: string
        correlationId:
          type: string
        errors:
          type: array
          items:
            type: object
            required:
              - field
              - code
              - message
            properties:
              field:
                type: string
              code:
                type: string
              message:
                type: string
              rejectedValue:
                nullable: true
