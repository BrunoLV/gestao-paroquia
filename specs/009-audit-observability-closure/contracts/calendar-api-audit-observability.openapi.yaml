openapi: 3.0.3
info:
  title: Calendar API - Audit Observability Closure
  version: 0.1.0
  description: >-
    Delta contratual da feature 009 para consulta de trilha auditável e taxa de retrabalho
    administrativo por período e organização.
servers:
  - url: http://localhost:8080
    description: Ambiente local
paths:
  /api/v1/auditoria/eventos/trilha:
    get:
      summary: Consulta a trilha auditável por período e organização
      operationId: listAuditTrail
      tags: [AuditoriaOperacional]
      parameters:
        - in: query
          name: organizacaoId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: granularidade
          required: false
          schema:
            type: string
            enum: [DIARIO, SEMANAL, MENSAL, ANUAL]
        - in: query
          name: inicio
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: fim
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: ator
          required: false
          schema:
            type: string
        - in: query
          name: acao
          required: false
          schema:
            type: string
        - in: query
          name: resultado
          required: false
          schema:
            type: string
        - in: query
          name: correlationId
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Trilha auditável retornada com ordenação determinística
          content:
            application/json:
              schema:
                type: object
                required: [organizacaoId, periodo, items]
                properties:
                  organizacaoId:
                    type: string
                    format: uuid
                  periodo:
                    $ref: '#/components/schemas/PeriodoOperacional'
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/RegistroAuditavel'
              examples:
                sucesso:
                  value:
                    organizacaoId: 00000000-0000-0000-0000-0000000000aa
                    periodo:
                      granularidade: SEMANAL
                      inicio: '2026-04-13T00:00:00Z'
                      fim: '2026-04-20T00:00:00Z'
                    items:
                      - id: 00000000-0000-0000-0000-000000000101
                        organizacaoId: 00000000-0000-0000-0000-0000000000aa
                        recursoTipo: EVENTO
                        recursoId: 6feea8df-58d0-4f81-9d16-f5a4bcc00001
                        acao: patch
                        resultado: success
                        ator: joao.silva
                        correlationId: corr-audit-001
                        ocorridoEmUtc: '2026-04-18T13:00:00Z'
                        detalhesAuditaveis:
                          scheduleChanged: true
                          sensitiveChange: true
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthRequiredError'
        '403':
          $ref: '#/components/responses/AccessDeniedError'
        '409':
          $ref: '#/components/responses/AuditPersistenceRequiredError'
        '503':
          $ref: '#/components/responses/AuthzSourceUnavailableError'
  /api/v1/auditoria/eventos/retrabalho:
    get:
      summary: Consulta a taxa de retrabalho por período e organização
      operationId: getAdministrativeReworkRate
      tags: [AuditoriaOperacional]
      parameters:
        - in: query
          name: organizacaoId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: granularidade
          required: false
          schema:
            type: string
            enum: [DIARIO, SEMANAL, MENSAL, ANUAL]
        - in: query
          name: inicio
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: fim
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Taxa de retrabalho consolidada para o período e organização
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndicadorRetrabalho'
              examples:
                sucesso:
                  value:
                    organizacaoId: 00000000-0000-0000-0000-0000000000aa
                    periodo:
                      inicio: '2026-04-01T00:00:00Z'
                      fim: '2026-04-30T00:00:00Z'
                    taxaRetrabalho: 1.5
                    numeradorOcorrenciasElegiveis: 3
                    denominadorEventosAfetados: 2
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthRequiredError'
        '403':
          $ref: '#/components/responses/AccessDeniedError'
        '409':
          $ref: '#/components/responses/AuditPersistenceRequiredError'
        '503':
          $ref: '#/components/responses/AuthzSourceUnavailableError'
components:
  schemas:
    PeriodoOperacional:
      type: object
      properties:
        granularidade:
          type: string
          enum: [DIARIO, SEMANAL, MENSAL, ANUAL]
        inicio:
          type: string
          format: date-time
        fim:
          type: string
          format: date-time
    RegistroAuditavel:
      type: object
      required:
        - id
        - organizacaoId
        - recursoTipo
        - recursoId
        - acao
        - resultado
        - ator
        - correlationId
        - ocorridoEmUtc
      properties:
        id:
          type: string
          format: uuid
        organizacaoId:
          type: string
          format: uuid
        recursoTipo:
          type: string
        recursoId:
          type: string
        acao:
          type: string
        resultado:
          type: string
        ator:
          type: string
        correlationId:
          type: string
        ocorridoEmUtc:
          type: string
          format: date-time
        detalhesAuditaveis:
          type: object
          additionalProperties: true
    IndicadorRetrabalho:
      type: object
      required:
        - organizacaoId
        - periodo
        - taxaRetrabalho
        - numeradorOcorrenciasElegiveis
        - denominadorEventosAfetados
      properties:
        organizacaoId:
          type: string
          format: uuid
        periodo:
          $ref: '#/components/schemas/PeriodoOperacional'
        taxaRetrabalho:
          type: number
          format: double
        numeradorOcorrenciasElegiveis:
          type: integer
          format: int64
        denominadorEventosAfetados:
          type: integer
          format: int64
    ValidationErrorResponse:
      type: object
      required: [errorCode, message, correlationId, errors]
      properties:
        errorCode:
          type: string
        message:
          type: string
        correlationId:
          type: string
        errors:
          type: array
          items:
            type: object
            required: [code, field, message]
            properties:
              code:
                type: string
              field:
                type: string
              message:
                type: string
              rejectedValue:
                type: string
  responses:
    ValidationError:
      description: Falha determinística de validação
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
          examples:
            periodoAmbiguo:
              value:
                errorCode: VALIDATION_FIELD_INVALID
                message: Granularidade e inicio/fim nao podem ser informados juntos
                correlationId: corr-audit-001
                errors:
                  - code: VALIDATION_FIELD_INVALID
                    field: periodo
                    message: Granularidade e inicio/fim nao podem ser informados juntos
                    rejectedValue: null
    AuthRequiredError:
      description: Autenticação obrigatória
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
          examples:
            authRequired:
              value:
                errorCode: AUTH_REQUIRED
                message: Authentication required
                correlationId: corr-audit-001
                errors: []
    AccessDeniedError:
      description: Escopo organizacional não autorizado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
          examples:
            accessDenied:
              value:
                errorCode: ACCESS_DENIED
                message: User cannot query audit data outside the responsible organization scope
                correlationId: corr-audit-001
                errors: []
    AuditPersistenceRequiredError:
      description: Persistência auditável obrigatória indisponível
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
          examples:
            auditPersistenceRequired:
              value:
                errorCode: AUDIT_PERSISTENCE_REQUIRED
                message: Falha ao persistir a trilha auditavel obrigatoria da operacao
                correlationId: corr-audit-001
                errors:
                  - code: AUDIT_PERSISTENCE_REQUIRED
                    field: auditTrail
                    message: Falha ao persistir a trilha auditavel obrigatoria da operacao
                    rejectedValue: null
    AuthzSourceUnavailableError:
      description: Fonte de autorização indisponível
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
