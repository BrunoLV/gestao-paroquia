openapi: 3.0.3
info:
  title: Calendario API - Spring Security RBAC Access Matrix
  version: 0.1.0
  description: >-
    Delta de contrato de seguranca. Define autenticacao via sessao stateful com
    cookie (JSESSIONID), endpoints de controle de sessao, e a matriz completa
    de autorizacao por endpoint. Todos os endpoints de negocio exigem
    autenticacao. Nenhum endpoint de negocio e publico (Decision 6).

servers:
  - url: /api/v1

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: JSESSIONID
      description: >-
        Sessao HTTP stateful gerenciada pelo Spring Security. Obtida apos POST
        /api/v1/auth/login bem-sucedido. Expirada apos inatividade ou logout
        explicito.

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: Nome de acesso registrado em `usuarios.username`
          example: "joao.silva"
        password:
          type: string
          format: password
          description: Senha em texto plano (transmitida via HTTPS)
          example: "senha123"

    LoginSuccessResponse:
      type: object
      properties:
        usuarioId:
          type: string
          format: uuid
          description: ID do usuario autenticado
          example: "00000000-0000-0000-0000-000000000001"
        username:
          type: string
          description: Nome de acesso autenticado
          example: "joao.silva"

    SecurityErrorResponse:
      type: object
      required: [errorCode, message]
      properties:
        errorCode:
          type: string
          enum:
            - AUTH_REQUIRED
            - AUTH_INVALID
            - ACCESS_DENIED
            - ROLE_SCOPE_INVALID
            - AUTHZ_SOURCE_UNAVAILABLE
            - SESSION_EXPIRED
          description: Codigo de maquina estaevel para diagnose por cliente
        message:
          type: string
          description: Mensagem legivel para log e debugging

# Regra global: todos os endpoints de negocio exigem sessionCookie
security:
  - sessionCookie: []

paths:
  /auth/login:
    post:
      summary: Iniciar sessao com usuario e senha
      operationId: loginUsuario
      description: >-
        Endpoint processado pelo UsernamePasswordAuthenticationFilter do Spring
        Security. Em caso de sucesso, retorna cookie JSESSIONID no response.
        Em caso de falha de credencial, retorna AUTH_INVALID (401).
      security: []  # Publico — unico endpoint de negocio sem autenticacao
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              loginValido:
                summary: Login com credenciais validas
                value:
                  username: "joao.silva"
                  password: "senha123"
      responses:
        '200':
          description: Autenticacao bem-sucedida. Cookie JSESSIONID definido no response.
          headers:
            Set-Cookie:
              description: Cookie de sessao JSESSIONID; HttpOnly; SameSite=Strict
              schema:
                type: string
                example: "JSESSIONID=abc123; Path=/; HttpOnly; SameSite=Strict"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
        '401':
          description: Credenciais invalidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityErrorResponse'
              examples:
                credenciaisInvalidas:
                  value:
                    errorCode: AUTH_INVALID
                    message: "Nome de usuario ou senha incorretos."
        '503':
          description: Banco de identidade indisponivel — fail-closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityErrorResponse'
              examples:
                fonteDadosIndisponivel:
                  value:
                    errorCode: AUTHZ_SOURCE_UNAVAILABLE
                    message: "Fonte de autorizacao temporariamente indisponivel."

  /auth/logout:
    post:
      summary: Encerrar sessao ativa
      operationId: logoutUsuario
      description: >-
        Invalida a sessao HTTP corrente e limpa o cookie JSESSIONID. Exige
        sessao ativa (sessionCookie). Se a sessao ja estiver expirada, retorna
        SESSION_EXPIRED (401).
      security:
        - sessionCookie: []
      responses:
        '204':
          description: Sessao encerrada com sucesso
          headers:
            Set-Cookie:
              description: Cookie JSESSIONID removido
              schema:
                type: string
                example: "JSESSIONID=; Max-Age=0; Path=/"
        '401':
          description: Sessao ausente ou expirada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityErrorResponse'
              examples:
                sessaoExpirada:
                  value:
                    errorCode: SESSION_EXPIRED
                    message: "Sessao expirada. Faca login novamente."

  /eventos:
    get:
      summary: Listar eventos
      operationId: listarEventos
      security:
        - sessionCookie: []
      description: Exige usuario autenticado. Papel organizacional nao e required para leitura.
      responses:
        '200':
          description: Lista de eventos retornada com sucesso
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Criar evento
      operationId: criarEvento
      security:
        - sessionCookie: []
      description: >-
        Exige usuario autenticado com papel autorizado na organizacao responsavel.
        AuthorizationPolicy.isRoleAllowed(orgType, role) validado em runtime.
        Papel `secretario` aceito somente para tipo_organizacao=CONSELHO.
      responses:
        '201':
          description: Evento criado com sucesso
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /eventos/{eventoId}:
    get:
      summary: Buscar evento por ID
      operationId: buscarEvento
      security:
        - sessionCookie: []
      parameters:
        - $ref: '#/components/parameters/eventoId'
      responses:
        '200':
          description: Evento retornado com sucesso
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      summary: Atualizar parcialmente evento
      operationId: atualizarEventoParcial
      security:
        - sessionCookie: []
      parameters:
        - $ref: '#/components/parameters/eventoId'
      description: >-
        Exige papel autorizado na organizacao responsavel pelo evento.
      responses:
        '200':
          description: Evento atualizado com sucesso
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /eventos/{eventoId}/participantes:
    put:
      summary: Substituir participantes
      operationId: substituirParticipantes
      security:
        - sessionCookie: []
      parameters:
        - $ref: '#/components/parameters/eventoId'
      description: Exige papel autorizado na organizacao do evento.
      responses:
        '200':
          description: Participantes atualizados
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      summary: Remover participantes
      operationId: removerParticipantes
      security:
        - sessionCookie: []
      parameters:
        - $ref: '#/components/parameters/eventoId'
      description: Exige papel autorizado na organizacao do evento.
      responses:
        '200':
          description: Participantes removidos
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /eventos/{eventoId}/recorrencia:
    post:
      summary: Criar recorrencia para evento
      operationId: criarRecorrencia
      security:
        - sessionCookie: []
      parameters:
        - $ref: '#/components/parameters/eventoId'
      description: Exige papel autorizado na organizacao responsavel.
      responses:
        '201':
          description: Recorrencia criada
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /projetos:
    get:
      summary: Listar projetos
      operationId: listarProjetos
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Lista de projetos retornada
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Criar projeto
      operationId: criarProjeto
      security:
        - sessionCookie: []
      responses:
        '201':
          description: Projeto criado
        '401':
          $ref: '#/components/responses/Unauthorized'

  /projetos/{projetoId}:
    get:
      summary: Buscar projeto por ID
      operationId: buscarProjeto
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: projetoId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Projeto retornado
        '401':
          $ref: '#/components/responses/Unauthorized'

  /aprovacoes:
    get:
      summary: Listar aprovacoes
      operationId: listarAprovacoes
      security:
        - sessionCookie: []
      description: >-
        CORRECAO DE SEGURANCA: removido permitAll() que existia no SecurityConfig
        anterior. Agora exige autenticacao e papel autorizado.
      responses:
        '200':
          description: Lista de aprovacoes retornada
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      summary: Criar aprovacao
      operationId: criarAprovacao
      security:
        - sessionCookie: []
      description: >-
        CORRECAO DE SEGURANCA: removido permitAll() que existia no SecurityConfig
        anterior. Agora exige autenticacao e papel autorizado.
      responses:
        '201':
          description: Aprovacao criada
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /aprovacoes/{aprovacaoId}:
    post:
      summary: Processar aprovacao
      operationId: processarAprovacao
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: aprovacaoId
          required: true
          schema:
            type: string
            format: uuid
      description: >-
        CORRECAO DE SEGURANCA: removido permitAll() que existia no SecurityConfig
        anterior. Agora exige papel autorizado.
      responses:
        '200':
          description: Aprovacao processada
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /observacoes:
    get:
      summary: Listar observacoes
      operationId: listarObservacoes
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Observacoes retornadas
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Criar observacao
      operationId: criarObservacao
      security:
        - sessionCookie: []
      responses:
        '201':
          description: Observacao criada
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auditoria:
    get:
      summary: Consultar log de auditoria
      operationId: consultarAuditoria
      security:
        - sessionCookie: []
      description: Exige usuario autenticado. Leitura de log de auditoria.
      responses:
        '200':
          description: Log de auditoria retornado
        '401':
          $ref: '#/components/responses/Unauthorized'

# Respostas reutilizaveis
  responses:
    Unauthorized:
      description: Sessao ausente, expirada ou credenciais invalidas
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SecurityErrorResponse'
          examples:
            semSessao:
              value:
                errorCode: AUTH_REQUIRED
                message: "Autenticacao necessaria."
            sessaoExpirada:
              value:
                errorCode: SESSION_EXPIRED
                message: "Sessao expirada. Faca login novamente."
    Forbidden:
      description: Autenticado mas sem autorizacao para a operacao
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SecurityErrorResponse'
          examples:
            semPermissao:
              value:
                errorCode: ACCESS_DENIED
                message: "Sem permissao para esta operacao."
            papelInvalido:
              value:
                errorCode: ROLE_SCOPE_INVALID
                message: "Papel incompativel com o tipo de organizacao."

  parameters:
    eventoId:
      in: path
      name: eventoId
      required: true
      schema:
        type: string
        format: uuid
      description: ID do evento
