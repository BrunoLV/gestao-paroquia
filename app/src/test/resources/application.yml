spring:
  datasource:
    url: jdbc:h2:mem:calendar;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: sa
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true

logging:
  level:
    br.com.nsfatima.calendario.infrastructure.observability: DEBUG
