spring:
  application:
    name: gestao-paroquia-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/calendario}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${PORT:8080}

app:
  timezone:
    output: ${APP_TIMEZONE:America/Sao_Paulo}

management:
  endpoints:
    web:
      exposure:
        include: health,info
